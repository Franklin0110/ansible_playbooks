---

- name: Pre-flight check - Ensure backup_dir is defined
  assert:
    that:
      - backup_dir is defined
      - backup_dir != '/'
    fail_msg: "backup_dir must be defined and cannot be root."

- name: Create backup directory
  file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  become: yes

- name: Backup critical files
  synchronize:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    recursive: yes
  loop:
    - { src: '/etc/kubernetes/admin.conf', dest: "{{ backup_dir }}/admin.conf" }
    - { src: '/etc/kubernetes/pki/', dest: "{{ backup_dir }}/pki/" }
    - { src: '/var/lib/etcd/', dest: "{{ backup_dir }}/etcd/" }
  ignore_errors: yes
  become: yes

- name: Drain node
  shell: kubectl drain {{ ansible_hostname }} --ignore-daemonsets --delete-emptydir-data --force
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ignore_errors: yes
  become: yes

- name: Reset kubeadm
  command: kubeadm reset --force
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ignore_errors: yes
  become: yes

- name: Stop Kubernetes and container services
  systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - kubelet
    - docker
    - containerd
  ignore_errors: yes
  become: yes

- name: Remove Kubernetes directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/kubernetes
    - /var/lib/kubelet
    - /var/lib/etcd
    - /etc/cni/net.d
    - /opt/cni/bin
    - /var/lib/cni
    - /run/flannel
    - /var/run/kubernetes
    - /root/.kube
    - "/home/{{ ansible_user | default(ansible_user_id) }}/.kube"
  become: yes

- name: Clean iptables rules
  shell: |
    iptables -F
    iptables -t nat -F
    iptables -t mangle -F
    iptables -X
  ignore_errors: yes
  become: yes

- name: Remove CNI network interfaces
  shell: |
    for iface in cni0 flannel.1 kube-ipvs0 weave docker0; do
      ip link delete "$iface" 2>/dev/null || true
    done
    for iface in $(ip -o link show | awk -F': ' '{print $2}' | grep -E '^veth|^cali'); do
      ip link delete "$iface" 2>/dev/null || true
    done
  ignore_errors: yes
  become: yes

- name: Remove all containers and volumes
  shell: |
    docker rm -f $(docker ps -aq) 2>/dev/null || true
    docker volume rm $(docker volume ls -q) 2>/dev/null || true
    docker system prune -af --volumes 2>/dev/null || true
    crictl rm $(crictl ps -aq) 2>/dev/null || true
    crictl rmp $(crictl pods -q) 2>/dev/null || true
  ignore_errors: yes
  become: yes

- name: Restart container runtime
  systemd:
    name: "{{ item }}"
    state: restarted
    enabled: yes
  loop:
    - containerd
    - docker
  ignore_errors: yes
  become: yes

- name: Cleanup complete
  debug:
    msg:
      - "✅ Kubernetes cluster cleanup complete"
      - "Backup location: {{ backup_dir }}"
      - "Ready for fresh cluster creation"
