---
- name: Install required tools and dependencies.
  hosts: machines
  become: yes
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  roles:
  - common

- name: kmaster_machine_deployment
    hosts: kmasters
    become: yes
    roles:
      - role: k8s-kmaster
        tags: ['kmaster', 'init']

      - role: k8s-master-join
        tags: ['join', 'add-master']
  
- name: Automate the ansible run in the jenkins hosts.
  hosts: jenkins
  become: yes
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  roles:
  - jenkins

