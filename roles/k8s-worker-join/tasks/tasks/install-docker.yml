---
# Install Docker Engine

- name: Remove old Docker versions (Debian/Ubuntu)
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Add Docker GPG key (Debian/Ubuntu)
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  when: ansible_os_family == "Debian"

- name: Add Docker repository (Debian/Ubuntu)
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install Docker Engine (Debian/Ubuntu)
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Add Docker repository (RHEL/CentOS)
  yum_repository:
    name: docker-ce
    description: Docker CE Repository
    baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
    gpgcheck: yes
    gpgkey: https://download.docker.com/linux/centos/gpg
    enabled: yes
  when: ansible_os_family == "RedHat"

- name: Install Docker Engine (RHEL/CentOS)
  yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  when: ansible_os_family == "RedHat"

- name: Create Docker configuration directory
  file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Configure Docker daemon for Kubernetes
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "exec-opts": ["native.cgroupdriver=systemd"],
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "{{ docker_log_max_size }}",
          "max-file": "{{ docker_log_max_file }}"
        },
        "storage-driver": "{{ docker_storage_driver }}",
        "storage-opts": [
          "overlay2.override_kernel_check=true"
        ]
      }
    mode: '0644'
  notify: restart docker

- name: Create systemd directory for Docker
  file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: '0755'

- name: Enable and start Docker service
  systemd:
    name: docker
    enabled: yes
    state: started
    daemon_reload: yes

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  when: ansible_user is defined

- name: Install cri-dockerd (CRI shim for Docker)
  block:
    - name: Check if cri-dockerd is installed
      stat:
        path: /usr/local/bin/cri-dockerd
      register: cri_dockerd_installed

    - name: Get latest cri-dockerd release
      uri:
        url: https://api.github.com/repos/Mirantis/cri-dockerd/releases/latest
        return_content: yes
      register: cri_dockerd_release
      when: not cri_dockerd_installed.stat.exists

    - name: Set cri-dockerd version
      set_fact:
        cri_dockerd_version: "{{ cri_dockerd_release.json.tag_name | regex_replace('^v', '') }}"
      when: not cri_dockerd_installed.stat.exists

    - name: Download cri-dockerd tarball
      get_url:
        url: "https://github.com/Mirantis/cri-dockerd/releases/download/v{{ cri_dockerd_version }}/cri-dockerd-{{ cri_dockerd_version }}.amd64.tgz"
        dest: /tmp/cri-dockerd.tgz
        mode: '0644'
      when: not cri_dockerd_installed.stat.exists

    - name: Extract cri-dockerd
      unarchive:
        src: /tmp/cri-dockerd.tgz
        dest: /tmp/
        remote_src: yes
      when: not cri_dockerd_installed.stat.exists

    - name: Install cri-dockerd binary
      copy:
        src: /tmp/cri-dockerd/cri-dockerd
        dest: /usr/local/bin/cri-dockerd
        mode: '0755'
        remote_src: yes
      when: not cri_dockerd_installed.stat.exists

    - name: Download cri-docker systemd service
      get_url:
        url: "https://raw.githubusercontent.com/Mirantis/cri-dockerd/master/packaging/systemd/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: '0644'
      loop:
        - cri-docker.service
        - cri-docker.socket
      when: not cri_dockerd_installed.stat.exists

    - name: Update cri-docker.service ExecStart
      lineinfile:
        path: /etc/systemd/system/cri-docker.service
        regexp: '^ExecStart='
        line: 'ExecStart=/usr/local/bin/cri-dockerd --container-runtime-endpoint fd:// --network-plugin=cni --pod-infra-container-image=registry.k8s.io/pause:3.9'
      when: not cri_dockerd_installed.stat.exists

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start cri-docker socket
      systemd:
        name: cri-docker.socket
        enabled: yes
        state: started

    - name: Enable and start cri-docker service
      systemd:
        name: cri-docker.service
        enabled: yes
        state: started

- name: Wait for cri-dockerd socket
  wait_for:
    path: /var/run/cri-dockerd.sock
    timeout: 30

- name: Verify Docker installation
  command: docker --version
  register: docker_version_output
  changed_when: false

- name: Display Docker version
  debug:
    msg: "Docker installed: {{ docker_version_output.stdout }}"

- name: Verify cri-dockerd installation
  command: /usr/local/bin/cri-dockerd --version
  register: cri_dockerd_version_output
  changed_when: false

- name: Display cri-dockerd version
  debug:
    msg: "cri-dockerd installed: {{ cri_dockerd_version_output.stdout }}"
