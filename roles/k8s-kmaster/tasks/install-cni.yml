---
# Install CNI (Container Network Interface) plugin

- name: Install Calico CNI
  block:
    - name: Download Calico manifest
      get_url:
        url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml"
        dest: /tmp/calico.yaml
        mode: '0644'

    - name: Apply Calico manifest
      command: kubectl apply -f /tmp/calico.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: calico_result
      changed_when: "'created' in calico_result.stdout or 'configured' in calico_result.stdout"

    - name: Wait for Calico pods to be ready
      shell: |
        export KUBECONFIG=/etc/kubernetes/admin.conf
        kubectl wait --for=condition=ready pod -l k8s-app=calico-node -n kube-system --timeout=300s
      register: calico_wait
      retries: 3
      delay: 10
      until: calico_wait.rc == 0
      changed_when: false
  when: cni_plugin == "calico"

- name: Install Flannel CNI
  block:
    - name: Download Flannel manifest
      get_url:
        url: https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
        dest: /tmp/kube-flannel.yml
        mode: '0644'

    - name: Apply Flannel manifest
      command: kubectl apply -f /tmp/kube-flannel.yml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: flannel_result
      changed_when: "'created' in flannel_result.stdout or 'configured' in flannel_result.stdout"

    - name: Wait for Flannel pods to be ready
      shell: |
        export KUBECONFIG=/etc/kubernetes/admin.conf
        kubectl wait --for=condition=ready pod -l app=flannel -n kube-flannel --timeout=300s
      register: flannel_wait
      retries: 3
      delay: 10
      until: flannel_wait.rc == 0
      changed_when: false
  when: cni_plugin == "flannel"

- name: Install Weave CNI
  block:
    - name: Apply Weave manifest
      command: >
        kubectl apply -f https://github.com/weaveworks/weave/releases/download/v2.8.1/weave-daemonset-k8s.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: weave_result
      changed_when: "'created' in weave_result.stdout or 'configured' in weave_result.stdout"

    - name: Wait for Weave pods to be ready
      shell: |
        export KUBECONFIG=/etc/kubernetes/admin.conf
        kubectl wait --for=condition=ready pod -l name=weave-net -n kube-system --timeout=300s
      register: weave_wait
      retries: 3
      delay: 10
      until: weave_wait.rc == 0
      changed_when: false
  when: cni_plugin == "weave"

- name: Verify CNI installation
  command: kubectl get nodes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: nodes_status
  changed_when: false

- name: Display nodes status
  debug:
    msg: "{{ nodes_status.stdout_lines }}"
