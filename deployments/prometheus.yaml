apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd # Donde vive ArgoCD
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 68.0.0 # Siempre usa una versión fija para evitar sorpresas
    helm:
      values: |
        grafana:
          adminPassword: "tu-password-base64" # Tip: usa un Secret mejor
        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring # El namespace donde quieres el stack
  syncPolicy:
    automated:
      prune: true
      selfHeel: true
    syncOptions:
      - CreateNamespace=true
