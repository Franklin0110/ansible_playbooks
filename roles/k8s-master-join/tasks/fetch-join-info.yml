---
# Fetch join information from first master

- name: Test SSH connection to first master
  wait_for:
    host: "{{ first_master_host }}"
    port: 22
    timeout: 10
  delegate_to: localhost

- name: Generate new certificate key on first master
  command: kubeadm init phase upload-certs --upload-certs
  register: cert_key_output
  delegate_to: "{{ first_master_host }}"
  become: yes
  changed_when: false

- name: Extract certificate key
  set_fact:
    certificate_key: "{{ cert_key_output.stdout_lines[-1] }}"

- name: Display certificate key
  debug:
    msg: "Certificate key: {{ certificate_key }}"

- name: Create new bootstrap token on first master
  command: kubeadm token create --print-join-command
  register: join_command_output
  delegate_to: "{{ first_master_host }}"
  become: yes
  changed_when: false

- name: Extract join token and CA cert hash
  set_fact:
    join_command: "{{ join_command_output.stdout }}"

- name: Parse join token
  set_fact:
    join_token: "{{ join_command | regex_search('--token ([^ ]+)', '\\1') | first }}"
    discovery_token_ca_cert_hash: "{{ join_command | regex_search('--discovery-token-ca-cert-hash ([^ ]+)', '\\1') | first }}"

- name: Display join information
  debug:
    msg:
      - "Join token: {{ join_token }}"
      - "CA cert hash: {{ discovery_token_ca_cert_hash }}"
      - "Control plane endpoint: {{ control_plane_endpoint }}"

- name: Verify first master API is reachable
  uri:
    url: "https://{{ control_plane_endpoint }}/healthz"
    validate_certs: no
    status_code: 200
  register: api_health
  retries: 3
  delay: 5
  until: api_health.status == 200
  delegate_to: localhost
