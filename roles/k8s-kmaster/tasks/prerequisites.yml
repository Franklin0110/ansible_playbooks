---
- name: Update apt cache (Debian/Ubuntu)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Update yum cache (RHEL/CentOS)
  yum:
    update_cache: yes
  when: ansible_os_family == "RedHat"

- name: Install required system packages
  package:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - git
      - wget
      - net-tools
      - socat
      - conntrack
      - ipset
      - iptables
    state: present
  ignore_errors: yes

- name: Disable swap permanently
  shell: |
    swapoff -a
    sed -i '/swap/d' /etc/fstab
  when: disable_swap | bool

- name: Check if swap is disabled
  command: swapon --show
  register: swap_status
  changed_when: false
  failed_when: false

- name: Disable firewalld (RHEL/CentOS)
  systemd:
    name: firewalld
    state: stopped
    enabled: no
  when:
    - disable_firewalld | bool
    - ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Disable UFW (Debian/Ubuntu)
  systemd:
    name: ufw
    state: stopped
    enabled: no
  when:
    - disable_firewalld | bool
    - ansible_os_family == "Debian"
  ignore_errors: yes

- name: Ensure br_netfilter kernel module is loaded permanently
  shell: |
    modprobe br_netfilter
    echo "br_netfilter" > /etc/modules-load.d/k8s.conf
  become: true

- name: Configure sysctl parameters for Kubernetes
  shell: |
    cat <<EOF > /etc/sysctl.d/k8s.conf
    net.bridge.bridge-nf-call-iptables = 1
    net.bridge.bridge-nf-call-ip6tables = 1
    net.ipv4.ip_forward = 1
    net.ipv6.conf.all.forwarding = 1
    vm.overcommit_memory = 1
    kernel.panic = 10
    kernel.panic_on_oops = 1
    EOF
  become: true

- name: Apply sysctl settings
  command: sysctl --system
  changed_when: false
  become: true
