---
- name: Replace /etc/resolv.conf with static content
  copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8
    owner: root
    group: root
    mode: '0644'

- name: Download ubuntu-keyring .deb for Focal
  get_url:
    url: "http://archive.ubuntu.com/ubuntu/pool/main/u/ubuntu-keyring/ubuntu-keyring_2020.02.11.4_all.deb"
    dest: /tmp/ubuntu-keyring_2020.02.11.4_all.deb
    mode: '0644'

- name: Install ubuntu-keyring via dpkg
  command: dpkg -i /tmp/ubuntu-keyring_2020.02.11.4_all.deb
  args:
    warn: false
  register: keyring_install
  changed_when: "'installed' in keyring_install.stderr or keyring_install.rc == 0"

- name: Fix missing dependencies
  apt:
    state: fixed
  ignore_errors: yes

# AFTER the keyring is fixed, then apt update will work:
- name: Update apt cache
  apt:
    update_cache: yes

