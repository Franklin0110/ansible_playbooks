---
# Install Kubernetes components (kubeadm, kubelet, kubectl)

- name: Add Kubernetes GPG key (Debian/Ubuntu)
  apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key
    state: present
  when: ansible_os_family == "Debian"

- name: Add Kubernetes repository (Debian/Ubuntu)
  apt_repository:
    repo: "deb https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
    state: present
    filename: kubernetes
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install Kubernetes packages (Debian/Ubuntu)
  apt:
    name:
      - "kubelet{% if kubernetes_full_version %}={{ kubernetes_full_version }}{% endif %}"
      - "kubeadm{% if kubernetes_full_version %}={{ kubernetes_full_version }}{% endif %}"
      - "kubectl{% if kubernetes_full_version %}={{ kubernetes_full_version }}{% endif %}"
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Add Kubernetes repository (RHEL/CentOS)
  yum_repository:
    name: kubernetes
    description: Kubernetes Repository
    baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/"
    gpgcheck: yes
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/repodata/repomd.xml.key"
    enabled: yes
  when: ansible_os_family == "RedHat"

- name: Install Kubernetes packages (RHEL/CentOS)
  yum:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    disable_excludes: kubernetes
  when: ansible_os_family == "RedHat"

- name: Hold Kubernetes packages at current version (Debian/Ubuntu)
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  when: ansible_os_family == "Debian"

- name: Configure kubelet to use cri-dockerd
  copy:
    dest: /etc/default/kubelet
    content: |
      KUBELET_EXTRA_ARGS="--container-runtime-endpoint=unix:///var/run/cri-dockerd.sock --cgroup-driver=systemd"
    mode: '0644'
  notify: restart kubelet

- name: Enable kubelet service
  systemd:
    name: kubelet
    enabled: yes
    daemon_reload: yes

- name: Verify kubeadm installation
  command: kubeadm version -o short
  register: kubeadm_version
  changed_when: false

- name: Display kubeadm version
  debug:
    msg: "kubeadm version: {{ kubeadm_version.stdout }}"
