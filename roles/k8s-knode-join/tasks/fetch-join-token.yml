---
# Fetch join token from master node

- name: Test SSH connection to master
  wait_for:
    host: "{{ master_host }}"
    port: 22
    timeout: 10
  delegate_to: localhost

- name: Generate join command on master
  command: kubeadm token create --print-join-command
  register: join_command_output
  delegate_to: "{{ master_host }}"
  become: yes
  changed_when: false

- name: Save join command
  set_fact:
    join_command: "{{ join_command_output.stdout }}"

- name: Parse join token
  set_fact:
    join_token: "{{ join_command | regex_search('--token ([^ ]+)', '\\1') | first }}"
    discovery_token_ca_cert_hash: "{{ join_command | regex_search('--discovery-token-ca-cert-hash ([^ ]+)', '\\1') | first }}"

- name: Display join information
  debug:
    msg:
      - "Join token: {{ join_token }}"
      - "CA cert hash: {{ discovery_token_ca_cert_hash }}"
      - "Master endpoint: {{ master_host }}:{{ master_port }}"

- name: Verify master API is reachable
  uri:
    url: "https://{{ master_host }}:{{ master_port }}/healthz"
    validate_certs: no
    status_code: 200
  register: api_health
  retries: 3
  delay: 5
  until: api_health.status == 200
  delegate_to: localhost
