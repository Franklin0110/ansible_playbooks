---
# Same prerequisites as first master

- name: Update apt cache (Debian/Ubuntu)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Update yum cache (RHEL/CentOS)
  yum:
    update_cache: yes
  when: ansible_os_family == "RedHat"

- name: Install required system packages
  package:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - git
      - wget
      - net-tools
      - socat
      - conntrack
      - ipset
      - iptables
    state: present
  ignore_errors: yes

- name: Disable swap permanently
  shell: |
    swapoff -a
    sed -i '/swap/d' /etc/fstab
  when: disable_swap | bool

- name: Disable firewalld (RHEL/CentOS)
  systemd:
    name: firewalld
    state: stopped
    enabled: no
  when:
    - disable_firewalld | bool
    - ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Disable UFW (Debian/Ubuntu)
  systemd:
    name: ufw
    state: stopped
    enabled: no
  when:
    - disable_firewalld | bool
    - ansible_os_family == "Debian"
  ignore_errors: yes

- name: Configure SELinux to permissive (RHEL/CentOS)
  selinux:
    policy: targeted
    state: permissive
  when:
    - configure_selinux | bool
    - ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
  ignore_errors: yes

- name: Ensure kernel modules load on boot
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: '0644'

- name: Configure sysctl parameters for Kubernetes
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
    sysctl_file: /etc/sysctl.d/k8s.conf
  loop:
    - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
    - { name: 'net.ipv4.ip_forward', value: '1' }
    - { name: 'net.ipv6.conf.all.forwarding', value: '1' }
    - { name: 'vm.overcommit_memory', value: '1' }
    - { name: 'kernel.panic', value: '10' }
    - { name: 'kernel.panic_on_oops', value: '1' }

- name: Apply sysctl settings
  command: sysctl --system
  changed_when: false
