---
- name: Install required tools and dependencies.
  hosts: machines
  become: yes
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  roles:
  - common

- name: kmaster_machine_deployment
  hosts: main_kmasters
  become: yes
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  roles:
  - k8s-kmaster

- name: Add second and third node to the system. 
  hosts: kmasters
  become: yes
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  roles:
  - k8s-master-join
  
- name: Automate the ansible run in the jenkins hosts.
  hosts: jenkins
  become: yes
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
  roles:
  - jenkins

