---
# Initialize Kubernetes cluster with kubeadm

- name: Check if cluster is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_config

- name: Generate kubeadm config file
  template:
    src: kubeadm-config.yaml.j2
    dest: /tmp/kubeadm-config.yaml
    mode: '0644'
  when: not kubeadm_config.stat.exists

- name: Initialize Kubernetes cluster
  command: >
    kubeadm init
    --config /tmp/kubeadm-config.yaml
    --upload-certs
  register: kubeadm_init
  when: not kubeadm_config.stat.exists

- name: Save kubeadm init output
  copy:
    content: "{{ kubeadm_init.stdout }}"
    dest: /tmp/kubeadm-init.log
    mode: '0600'
  when: kubeadm_init.changed

- name: Extract join command
  shell: |
    grep -A 2 "kubeadm join" /tmp/kubeadm-init.log | head -n 3
  register: join_command_raw
  when: kubeadm_init.changed
  changed_when: false

- name: Save join command locally
  copy:
    content: "{{ join_command_raw.stdout }}"
    dest: /tmp/k8s-join-command.sh
    mode: '0600'
  delegate_to: localhost
  become: no
  when: kubeadm_init.changed

- name: Create .kube directory for root
  file:
    path: /root/.kube
    state: directory
    mode: '0755'

- name: Copy admin.conf to root's kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: yes
    owner: root
    group: root
    mode: '0600'

- name: Create .kube directory for ansible user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  when: ansible_user is defined

- name: Copy admin.conf to user's kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
  when: ansible_user is defined

- name: Copy kubeconfig to local machine
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: /tmp/k8s-admin.conf
    flat: yes

- name: Set KUBECONFIG in bashrc for root
  lineinfile:
    path: /root/.bashrc
    line: 'export KUBECONFIG=/root/.kube/config'
    create: yes

- name: Set KUBECONFIG in bashrc for user
  lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    line: 'export KUBECONFIG=$HOME/.kube/config'
    create: yes
  when: ansible_user is defined

- name: Add kubectl alias
  lineinfile:
    path: "{{ item }}"
    line: "alias k='kubectl'"
    create: yes
  loop:
    - /root/.bashrc
    - "/home/{{ ansible_user }}/.bashrc"
  when: ansible_user is defined

- name: Wait for all control plane pods to be ready
  shell: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    kubectl get pods -n kube-system -o json | \
    jq -r '.items[] | select(.status.phase != "Running" and .status.phase != "Succeeded") | .metadata.name'
  register: pending_pods
  retries: 30
  delay: 10
  until: pending_pods.stdout == ""
  changed_when: false
