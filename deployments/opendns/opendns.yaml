apiVersion: v1
kind: Namespace
metadata:
  name: custom-dns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-config
  namespace: custom-dns
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        prometheus :9153
        
        # 1. Evaluate your local network mappings first
        hosts {
            10.99.72.169 argocd.uro.net
            10.10.1.202  jenkins.uro.net
            10.10.1.100  kmaster01.c1.uro.net
            10.10.1.19   kmaster02.c1.uro.net
            10.10.1.21   kmaster03.c1.uro.net
            10.10.1.118  knode01.c1.uro.net
            10.10.1.126  knode02.c1.uro.net
            10.10.1.21   knode03.c1.uro.net
            10.10.1.188  openvpn.uro.net
            10.10.1.53   kvm01.c1.uro.net
            10.10.1.11   minecraft.uro.net
            fallthrough
        }

        # 2. If not matched above, pass it to public internet resolvers
        forward . 1.1.1.1 8.8.8.8 {
            max_concurrent 1000
        }
        
        cache 30
        loop
        reload
        loadbalance
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns
  namespace: custom-dns
  labels:
    k8s-app: coredns
spec:
  replicas: 2 # High Availability: runs across multiple nodes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      k8s-app: coredns
  template:
    metadata:
      labels:
        k8s-app: coredns
    spec:
      containers:
      - name: coredns
        image: coredns/coredns:1.11.1 # Standard official CoreDNS image
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: 170Mi
          requests:
            cpu: 100m
            memory: 70Mi
        args: [ "-conf", "/etc/coredns/Corefile" ]
        volumeMounts:
        - name: config-volume
          mountPath: /etc/coredns
          readOnly: true
        ports:
        - name: dns-udp
          containerPort: 53
          protocol: UDP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        - name: metrics
          containerPort: 9153
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 60
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8181
            scheme: HTTP
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE # Required to bind to low port 53
            drop:
            - all
          readOnlyRootFilesystem: true
      dnsPolicy: Default
      volumes:
        - name: config-volume
          configMap:
            name: coredns-config
            items:
            - key: Corefile
              path: Corefile
---
apiVersion: v1
kind: Service
metadata:
  name: coredns-service
  namespace: custom-dns
  labels:
    k8s-app: coredns
spec:
  selector:
    k8s-app: coredns
  # Since you have an OpenVPN setup, this ClusterIP falls right into your HA pool!
  type: ClusterIP 
  clusterIP: 10.102.233.245
  clusterIPs:
    - 10.102.233.245
  ports:
  - name: dns-udp
    port: 53
    protocol: UDP
    targetPort: 53
  - name: dns-tcp
    port: 53
    protocol: TCP
    targetPort: 53
