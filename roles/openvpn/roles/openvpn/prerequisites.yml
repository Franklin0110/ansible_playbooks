---
# System prerequisites for worker nodes

- name: Update apt cache (Debian/Ubuntu)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install required system packages
  package:
    name:
      - openssl
      - lzo
      - curl
      - pam
      - openssl-devel
      - lzo-devel
      - pam-devel
    state: present
  ignore_errors: yes
